<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IsoTrack</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{
      --bg:#0d1117;
      --panel:#151c25;
      --card:#18212c;
      --line:rgba(255,255,255,.08);
      --text:#f3f4f6;
      --muted:#b7c0cb;
      --gold:#c9a45c;
      --gold2:#e8c985;
      --green:#2bc56d;
      --yellow:#f1bd4d;
      --red:#df5a5a;
      --shadow:0 12px 28px rgba(0,0,0,.25);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(201,164,92,.12), transparent 22%),
        radial-gradient(circle at top right, rgba(44,92,58,.12), transparent 20%),
        linear-gradient(180deg, #0b1118 0%, #101723 100%);
      min-height:100vh;
    }

    .wrap{
      width:min(1220px, calc(100% - 24px));
      margin:18px auto 90px;
    }

    .hero{
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px 20px;
      background:
        linear-gradient(135deg, rgba(201,164,92,.16), rgba(201,164,92,.03)),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      box-shadow:var(--shadow);
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .hero h1{
      margin:0;
      font-size:clamp(28px, 5vw, 44px);
      line-height:1;
    }

    .hero p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:9px 14px;
      border:1px solid rgba(201,164,92,.28);
      background:rgba(201,164,92,.08);
      color:var(--gold2);
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin:16px 0;
    }

    .tab{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 10px;
      font-weight:800;
      color:var(--text);
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:var(--shadow);
      transition:.18s ease;
    }

    .tab:hover{transform:translateY(-1px)}
    .tab.active{
      background:linear-gradient(180deg, rgba(201,164,92,.25), rgba(201,164,92,.10));
      border-color:rgba(201,164,92,.42);
      color:#fff3d8;
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:24px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      margin:0 0 8px;
      font-size:24px;
    }

    .subtext{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar,.actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .toolbar{margin-bottom:14px}
    .actions{margin-top:16px}

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:11px 14px;
      font-weight:800;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, #2b3644, #1c2430);
      box-shadow:var(--shadow);
      transition:.18s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:linear-gradient(180deg, #e0bc74, #b88835);
      color:#1d1305;
      border-color:rgba(255,220,160,.38);
    }
    .btn-danger{
      background:linear-gradient(180deg, #b94b4b, #7a2a2a);
    }
    .btn-ghost{
      background:rgba(255,255,255,.05);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:14px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent);
      box-shadow:var(--shadow);
    }

    .card.clickable{cursor:pointer}
    .card.clickable:hover{transform:translateY(-2px); transition:.18s ease}

    .status-green{border-left:6px solid var(--green)}
    .status-yellow{border-left:6px solid var(--yellow)}
    .status-red{border-left:6px solid var(--red)}

    .card-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .card-title{
      margin:0;
      font-size:18px;
      line-height:1.15;
    }

    .muted{color:var(--muted)}

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.06);
      color:var(--muted);
    }
    .badge.green{background:rgba(43,197,109,.12); color:#99efbe; border-color:rgba(43,197,109,.2)}
    .badge.yellow{background:rgba(241,189,77,.12); color:#ffdd8e; border-color:rgba(241,189,77,.2)}
    .badge.red{background:rgba(223,90,90,.12); color:#ffb3b3; border-color:rgba(223,90,90,.2)}

    .meta{
      display:grid;
      gap:7px;
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
    }
    .meta strong{color:var(--text)}

    .thumb{
      width:100%;
      max-height:180px;
      object-fit:cover;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#0f141a;
      display:block;
      margin:10px 0 2px;
    }

    label{
      display:block;
      margin:10px 0 6px;
      font-size:14px;
      font-weight:800;
      color:#eef2f7;
    }

    input,textarea,select{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#0e1620;
      color:var(--text);
      padding:12px 13px;
      font-size:15px;
      outline:none;
    }

    input[type="checkbox"]{
      width:auto;
      transform:scale(1.2);
      margin-right:8px;
    }

    textarea{min-height:108px;resize:vertical}
    input::placeholder,textarea::placeholder{color:#8b96a4}

    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:12px;
    }

    .empty{
      text-align:center;
      padding:34px 18px;
      border-radius:20px;
      border:1px dashed rgba(255,255,255,.14);
      color:var(--muted);
      background:rgba(255,255,255,.02);
    }

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .info-note{
      font-size:13px;
      color:#fff1cf;
      background:rgba(201,164,92,.12);
      border:1px solid rgba(201,164,92,.22);
      border-radius:14px;
      padding:10px 12px;
      margin:0 0 14px;
    }

    .sheet-wrap{
      margin-top:18px;
      padding:20px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:auto;
    }

    .sheet{
      width:900px;
      margin:0 auto;
      overflow:hidden;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }

    .sheet-header{
      padding:26px 28px 18px;
      text-align:center;
    }

    .sheet-logo{
      max-width:120px;
      max-height:120px;
      object-fit:contain;
      display:block;
      margin:0 auto 14px;
    }

    .sheet-title{
      margin:0;
      font-size:44px;
      line-height:1.02;
      font-weight:800;
    }

    .sheet-sub{
      margin:6px 0 0;
      font-size:18px;
    }

    .sheet-banner{
      margin:16px 28px 12px;
      text-align:center;
      padding:10px 14px;
      font-weight:800;
      border-radius:999px;
      font-size:16px;
    }

    .sheet-body{
      padding:6px 28px 30px;
    }

    .sheet-section{
      margin-top:18px;
    }

    .sheet-section-title{
      font-weight:800;
      font-size:18px;
      text-align:center;
      padding:10px 12px;
      border-radius:12px 12px 0 0;
    }

    .sheet-table{
      border:1px solid rgba(0,0,0,.12);
      border-top:none;
      overflow:hidden;
      border-radius:0 0 12px 12px;
    }

    .sheet-row{
      display:grid;
      grid-template-columns:1.45fr .7fr .65fr;
      align-items:center;
      font-size:18px;
      min-height:48px;
    }

    .sheet-row > div{
      padding:10px 14px;
      border-right:1px solid rgba(0,0,0,.12);
    }

    .sheet-row > div:last-child{border-right:none}
    .sheet-row + .sheet-row{border-top:1px solid rgba(0,0,0,.10)}

    .sheet-footer{
      text-align:center;
      padding:14px 28px 26px;
      font-size:13px;
      opacity:.82;
    }

    .theme-botanical{
      background:#f4f1e8;
      color:#213528;
    }
    .theme-botanical .sheet-header{
      background:
        radial-gradient(circle at top left, rgba(197,164,91,.22), transparent 30%),
        linear-gradient(135deg, #f3ead7 0%, #dfe7d4 100%);
      border-bottom:1px solid rgba(33,53,40,.12);
    }
    .theme-botanical .sheet-banner{background:#295a3a;color:#fff7e4;}
    .theme-botanical .sheet-section-title{background:#295a3a;color:#fff7e4;}
    .theme-botanical .sheet-table{background:#f9f7f0;border-color:rgba(33,53,40,.18);}
    .theme-botanical .sheet-row:nth-child(even){background:#eef2e9;}

    .theme-parchment{
      background:#efe2c9;
      color:#1f160a;
      border:4px solid #1d140a;
      border-radius:0;
      position:relative;
    }
    .theme-parchment:before{
      content:"";
      position:absolute;
      inset:14px;
      border:2px solid rgba(33,20,10,.75);
      pointer-events:none;
    }
    .theme-parchment .sheet-header{
      background:
        radial-gradient(circle at center, rgba(255,255,255,.22), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.02));
    }
    .theme-parchment .sheet-banner{background:#1d140a;color:#f6e7c7;}
    .theme-parchment .sheet-section-title{
      background:transparent;color:#1d140a;text-decoration:underline;font-size:17px;padding-bottom:6px;
    }
    .theme-parchment .sheet-table{border:none;background:transparent;}
    .theme-parchment .sheet-row{
      grid-template-columns:1.5fr .7fr .65fr;
      font-size:20px;
    }
    .theme-parchment .sheet-row,
    .theme-parchment .sheet-row + .sheet-row{border-top:none;}
    .theme-parchment .sheet-row > div{border-right:none;padding:6px 10px;}

    .theme-luxe{background:#101820;color:#f3efe6;}
    .theme-luxe .sheet-header{
      background:
        radial-gradient(circle at top left, rgba(201,164,92,.25), transparent 28%),
        linear-gradient(135deg, #111820 0%, #1c2a38 100%);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .theme-luxe .sheet-banner{background:linear-gradient(90deg, #c9a45c, #e7ca8c);color:#151006;}
    .theme-luxe .sheet-section-title{
      background:linear-gradient(90deg, #233342, #18222d);
      color:#f8e9c6;
      border:1px solid rgba(201,164,92,.24);
      border-bottom:none;
    }
    .theme-luxe .sheet-table{background:#13202b;border-color:rgba(255,255,255,.08);}
    .theme-luxe .sheet-row{color:#edf1f5;}
    .theme-luxe .sheet-row:nth-child(even){background:#172733;}

    .right{text-align:right}
    .center{text-align:center}
    .checkbox-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }
    .price-builder-row{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
      background:rgba(255,255,255,.02);
    }
    .section-manager{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:16px;
      background:rgba(255,255,255,.02);
    }
    .section-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      margin:0 8px 8px 0;
      font-size:13px;
      font-weight:700;
    }
    .mini-btn{
      border:none;
      background:transparent;
      color:#ffb3b3;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
    }

    @media (max-width:900px){
      .tabs{grid-template-columns:repeat(2,1fr)}
      .split{grid-template-columns:1fr}
      .sheet{width:760px}
    }
    @media (max-width:700px){
      .sheet-wrap{padding:10px}
      .sheet{width:690px}
      .sheet-title{font-size:34px}
      .sheet-row{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>IsoTrack</h1>
          <p>Colony tracking, botanicals inventory, and premium vendor price sheets.</p>
        </div>
        <div class="pill">Colonies • Population • Botanicals • Price Sheets</div>
      </div>
    </section>

    <div class="tabs">
      <button class="tab active" data-tab="colonies">Colonies</button>
      <button class="tab" data-tab="population">Population</button>
      <button class="tab" data-tab="botanicals">Botanicals</button>
      <button class="tab" data-tab="price">Price Sheet</button>
    </div>

    <section class="panel">
      <div id="app"></div>
    </section>
  </div>

  <script>
    const COLONY_KEY = "isotrack_colonies_v5";
    const BOTANICAL_KEY = "isotrack_botanicals_v5";
    const SETTINGS_KEY = "isotrack_settings_v5";
    const PRICE_KEY = "isotrack_prices_v5";
    const BOT_PRICE_KEY = "isotrack_botanical_prices_v5";
    const SECTION_KEY = "isotrack_sections_v5";

    let colonies = JSON.parse(localStorage.getItem(COLONY_KEY) || "[]");
    let botanicals = JSON.parse(localStorage.getItem(BOTANICAL_KEY) || "[]");
    let settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"businessName":"Crested Critters","logoUri":"","theme":"botanical","tagline":"Isopods & Botanicals","promoText":"BUY ANY 2 ISOPODS — GET $5 OFF","footerNote":"*Availability may vary*"}');
    let priceData = JSON.parse(localStorage.getItem(PRICE_KEY) || "{}");
    let botanicalPriceData = JSON.parse(localStorage.getItem(BOT_PRICE_KEY) || "{}");
    let priceSections = JSON.parse(localStorage.getItem(SECTION_KEY) || '["Isopods","Springtails","Millipedes","Beetles","Botanicals","Exotic","Mid Tier","Beginner"]');

    function saveColonies(){ localStorage.setItem(COLONY_KEY, JSON.stringify(colonies)); }
    function saveBotanicals(){ localStorage.setItem(BOTANICAL_KEY, JSON.stringify(botanicals)); }
    function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
    function savePrices(){ localStorage.setItem(PRICE_KEY, JSON.stringify(priceData)); }
    function saveBotanicalPrices(){ localStorage.setItem(BOT_PRICE_KEY, JSON.stringify(botanicalPriceData)); }
    function saveSections(){ localStorage.setItem(SECTION_KEY, JSON.stringify(priceSections)); }
    function saveAll(){ saveColonies(); saveBotanicals(); saveSettings(); savePrices(); saveBotanicalPrices(); saveSections(); }

    function app(html){ document.getElementById("app").innerHTML = html; }

    function esc(text){
      return (text || "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }

    function formatDate(input){
      if(!input) return "";
      const d = new Date(input);
      if(isNaN(d)) return "";
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const y = d.getFullYear();
      return `${m}/${day}/${y}`;
    }

    function todayString(){ return formatDate(new Date()); }

    function parseDateString(str){
      if(!str) return null;
      const parts = str.split("/");
      if(parts.length !== 3) return null;
      const [m,d,y] = parts.map(Number);
      if(!m || !d || !y) return null;
      return new Date(y, m - 1, d);
    }

    function daysSince(dateStr){
      if(!dateStr) return 999999;
      const dt = parseDateString(dateStr);
      if(!dt) return 999999;
      const a = new Date();
      a.setHours(0,0,0,0);
      dt.setHours(0,0,0,0);
      return Math.floor((a - dt) / 86400000);
    }

    function getStatus(days){
      if(days <= 3) return "green";
      if(days <= 10) return "yellow";
      return "red";
    }

    function statusText(days){
      if(days <= 3) return "Checked recently";
      if(days <= 10) return "Needs attention soon";
      return "Needs checked";
    }

    function updateLastHusbandry(colony){
      const dates = [
        colony.lastMisting,
        colony.lastBotanicalsCheck,
        colony.lastSubstrateCheck,
        colony.lastSupplementalFeeding
      ].filter(Boolean);

      if(!dates.length){
        colony.lastHusbandry = "";
        return;
      }

      let latest = dates[0];
      for(const d of dates){
        if(parseDateString(d) > parseDateString(latest)) latest = d;
      }
      colony.lastHusbandry = latest;
    }

    function uniqueTypes(){
      return [...new Set(colonies.map(c => (c.typeName || "").trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    }

    function uniqueCategories(){
      const fromColonies = colonies.map(c => (c.category || "").trim()).filter(Boolean);
      return [...new Set(fromColonies)].sort((a,b)=>a.localeCompare(b));
    }

    function slug(str){
      return (str || "").toLowerCase().replace(/[^a-z0-9]+/g, "_");
    }

    function setTab(tab){
      document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      if(tab === "colonies") renderColonies();
      if(tab === "population") renderPopulation();
      if(tab === "botanicals") renderBotanicals();
      if(tab === "price") renderPriceSheet();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    function exportProfile(){
      const profile = {
        version: 2,
        exportedAt: new Date().toISOString(),
        data: { colonies, botanicals, settings, priceData, botanicalPriceData, priceSections }
      };
      const blob = new Blob([JSON.stringify(profile, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "isotrack-profile-backup.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function importProfileFromInput(input){
      const file = input.files && input.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        try{
          const parsed = JSON.parse(e.target.result);
          if(!parsed || !parsed.data){ alert("Invalid backup file."); return; }
          colonies = Array.isArray(parsed.data.colonies) ? parsed.data.colonies : [];
          botanicals = Array.isArray(parsed.data.botanicals) ? parsed.data.botanicals : [];
          settings = parsed.data.settings || settings;
          priceData = parsed.data.priceData || {};
          botanicalPriceData = parsed.data.botanicalPriceData || {};
          priceSections = Array.isArray(parsed.data.priceSections) ? parsed.data.priceSections : priceSections;
          saveAll();
          alert("Profile imported successfully.");
          renderColonies();
        } catch(err){
          alert("Could not import backup file.");
        }
      };
      reader.readAsText(file);
    }

    function renderColonies(){
      const sorted = colonies.slice().sort((a,b) => daysSince(b.lastHusbandry) - daysSince(a.lastHusbandry));
      let html = `
        <h2 class="section-title">Colonies</h2>
        <p class="subtext">Your main working list. Oldest updated colonies appear first so you can see what needs attention.</p>
        <div class="toolbar">
          <button class="btn btn-primary" onclick="showAddColonyForm()">+ Add Colony</button>
          <button class="btn btn-ghost" onclick="exportProfile()">Export Profile Backup</button>
          <label class="btn btn-ghost" style="display:inline-flex;align-items:center;justify-content:center;">
            Import Profile Backup
            <input type="file" accept=".json,application/json" style="display:none" onchange="importProfileFromInput(this)">
          </label>
          <button class="btn btn-ghost" onclick="loadDemoData()">Load Demo Data</button>
          <button class="btn btn-ghost" onclick="clearAllData()">Clear All Data</button>
        </div>
      `;

      if(!sorted.length){
        html += `<div class="empty">No colonies yet. Add your first colony to get started.</div>`;
        return app(html);
      }

      html += `<div class="grid">`;
      sorted.forEach(c => {
        const index = colonies.findIndex(x => x.colonyName === c.colonyName);
        const days = daysSince(c.lastHusbandry);
        const status = getStatus(days);

        html += `
          <div class="card clickable status-${status}" onclick="openColony(${index})">
            <div class="card-head">
              <div>
                <h3 class="card-title">${esc(c.colonyName)}</h3>
                <div class="muted">${esc(c.typeName)}</div>
              </div>
              <span class="badge ${status}">${statusText(days)}</span>
            </div>
            ${c.typeImageUri ? `<img class="thumb" src="${c.typeImageUri}" alt="">` : ""}
            <div class="meta">

      const sel = document.getElementById(prefix + "categorySelect");
      if(!sel) return "";
      if(sel.value === "__custom__"){
        return (document.getElementById(prefix + "customCategory")?.value || "").trim();
      }
      return sel.value.trim();

    function saveNewColony(){
      const colonyName = document.getElementById("colonyName").value.trim();
      const typeName = document.getElementById("typeName").value.trim();
      const category = getChosenCategory("");

      if(!colonyName){ alert("Colony name is required."); return; }
      if(!typeName){ alert("Type name is required."); return; }
      if(!category){ alert("Category is required."); return; }
      if(colonies.some(c => c.colonyName.toLowerCase() === colonyName.toLowerCase())){
        alert("Colony name already in use. Please choose a different colony name.");
        return;
      }

      const colony = {
        colonyName,
        typeName,
        category,
        typeImageUri:"",
        dateAdded: document.getElementById("dateAdded").value.trim() || todayString(),
        population: Math.max(0, parseInt(document.getElementById("population").value || "0", 10)),
        lastMisting: document.getElementById("lastMisting").value.trim(),
        lastBotanicalsCheck: document.getElementById("lastBotanicalsCheck").value.trim(),
        lastSubstrateCheck: document.getElementById("lastSubstrateCheck").value.trim(),
        lastSupplementalFeeding: document.getElementById("lastSupplementalFeeding").value.trim(),
        lastHusbandry:"",
        customNote: document.getElementById("customNote").value.trim()
      };

      updateLastHusbandry(colony);

      const file = document.getElementById("typeImage").files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = e => {
          colony.typeImageUri = e.target.result;
          colonies.push(colony);
          saveColonies();
          renderColonies();
        };
        reader.readAsDataURL(file);
      } else {
        colonies.push(colony);
        saveColonies();
        renderColonies();
      }
    }

      const c = colonies[index];
      const category = getChosenCategory("edit");
      if(!category){ alert("Category is required."); return; }

      c.population = Math.max(0, parseInt(document.getElementById("editPopulation").value || "0", 10));
      c.category = category;
      c.lastMisting = document.getElementById("editMisting").value.trim();
      c.lastBotanicalsCheck = document.getElementById("editBotanicals").value.trim();
      c.lastSubstrateCheck = document.getElementById("editSubstrate").value.trim();
      c.lastSupplementalFeeding = document.getElementById("editFeeding").value.trim();
      c.customNote = document.getElementById("editNote").value.trim();
      updateLastHusbandry(c);
      saveColonies();
      openColony(index);
      alert("Colony updated.");
    }

    function quickAction(index, action){
      const today = todayString();
      const c = colonies[index];
      if(action === "misting") c.lastMisting = today;
      if(action === "feeding") c.lastSupplementalFeeding = today;
      if(action === "botanicals") c.lastBotanicalsCheck = today;
      if(action === "substrate") c.lastSubstrateCheck = today;
      c.lastHusbandry = today;
      saveColonies();
      openColony(index);
      alert("Colony updated.");

        renderColonies();

    function renderPopulation(){
      const totals = {};
      colonies.forEach(c => {

        if(!t) return;
        totals[t] = (totals[t] || 0) + (Number(c.population) || 0);

      let html = `

        <p class="subtext">View total population by type. Tap a type for the colony breakdown.</p>

        html += `

      const matches = colonies.filter(c => c.typeName === type).sort((a,b)=>(Number(b.population)||0) - (Number(a.population)||0));

        return;

      priceSections.push(name);
      saveSections();
      renderPriceSheet();

    function deleteSection(name){
      if(["Botanicals"].includes(name)){
        alert("Botanicals section cannot be removed.");
        return;
      }
      priceSections = priceSections.filter(s => s !== name);
      Object.keys(priceData).forEach(k => {
        if(priceData[k]?.section === name) priceData[k].section = "";
      });
      Object.keys(botanicalPriceData).forEach(k => {
        if(botanicalPriceData[k]?.section === name) botanicalPriceData[k].section = "Botanicals";
      });
      saveSections();
      savePrices();
      saveBotanicalPrices();
      renderPriceSheet();

    function savePriceSheetSettings(){
      settings.businessName = document.getElementById("businessName").value.trim() || "IsoTrack";
      settings.tagline = document.getElementById("tagline").value.trim() || "";
      settings.theme = document.getElementById("themeSelect").value;
      settings.promoText = document.getElementById("promoText").value.trim();
      settings.footerNote = document.getElementById("footerNote").value.trim();

      uniqueTypes().forEach(type => {
        const existing = priceData[type] || {};
        priceData[type] = {
          ...existing,
          included: document.getElementById(`include_${slug(type)}`)?.checked ?? true,
          section: document.getElementById(`section_${slug(type)}`)?.value.trim() || "",
          price: document.getElementById(`price_${slug(type)}`)?.value.trim() || "",
          countLabel: document.getElementById(`count_${slug(type)}`)?.value.trim() || ""
        };
      });

      botanicals.forEach(item => {
        const existing = botanicalPriceData[item.itemName] || {};
        botanicalPriceData[item.itemName] = {
          ...existing,
          included: document.getElementById(`botinclude_${slug(item.itemName)}`)?.checked ?? true,
          section: document.getElementById(`botsection_${slug(item.itemName)}`)?.value.trim() || "Botanicals",
          price: document.getElementById(`botprice_${slug(item.itemName)}`)?.value.trim() || "",
          priceNote: document.getElementById(`botnote_${slug(item.itemName)}`)?.value.trim() || ""
        };
      });

      const file = document.getElementById("logoUpload").files[0];

      function finish(){
        saveSettings();
        savePrices();
        saveBotanicalPrices();
        renderPriceSheet();
        alert("Price sheet settings saved.");
      }

      if(file){
        const reader = new FileReader();
        reader.onload = e => {
          settings.logoUri = e.target.result;
          finish();
        };
        reader.readAsDataURL(file);
      } else {
        finish();
      }
    }

    function buildSheetSections(){
      const sections = {};

      uniqueTypes().forEach(type => {
        const row = priceData[type];
        if(!row || row.included === false) return;
        const section = row.section || colonies.find(c => c.typeName === type)?.category || "Other";
        if(!sections[section]) sections[section] = [];
        sections[section].push({
          name: type,
          note: row.countLabel || "",
          price: row.price || "Not Available"
        });
      });

      botanicals.forEach(item => {
        const row = botanicalPriceData[item.itemName];
        if(!row || row.included === false) return;
        const section = row.section || "Botanicals";
        if(!sections[section]) sections[section] = [];
        sections[section].push({
          name: item.itemName,
          note: row.priceNote || "",
          price: row.price || "Not Available"
        });
      });

      Object.keys(sections).forEach(k => {
        sections[k].sort((a,b)=>a.name.localeCompare(b.name));
      });

      return sections;
    }

    function renderPriceSheetPreview(){
      const mount = document.getElementById("priceSheetPreviewMount");
      if(!mount) return;

      const sections = buildSheetSections();
      const orderedKeys = [...new Set([...priceSections, ...Object.keys(sections)])].filter(k => sections[k] && sections[k].length);

      const themeClass = {
        botanical: "theme-botanical",
        parchment: "theme-parchment",
        luxe: "theme-luxe"
      }[settings.theme] || "theme-botanical";

      const logoHtml = settings.logoUri ? `<img class="sheet-logo" src="${settings.logoUri}" alt="">` : "";

      const renderRows = rows => rows.map(row => `
        <div class="sheet-row">
          <div>${esc(row.name)}</div>
          <div class="center">${esc(row.note || "")}</div>
          <div class="right">${esc(row.price || "Not Available")}</div>
        </div>
      `).join("");

      mount.innerHTML = `
        <div class="sheet ${themeClass}" id="exportSheet">
          <div class="sheet-header">
            ${logoHtml}
            <h1 class="sheet-title">${esc(settings.businessName || "IsoTrack")}</h1>
            <div class="sheet-sub">${esc(settings.tagline || "Price Sheet")}</div>
          </div>

          ${settings.promoText ? `<div class="sheet-banner">${esc(settings.promoText)}</div>` : ""}

          <div class="sheet-body">
            ${orderedKeys.map(section => `
              <div class="sheet-section">
                <div class="sheet-section-title">${esc(section)}</div>
                <div class="sheet-table">
                  ${renderRows(sections[section])}
                </div>
              </div>
            `).join("") || `<div class="empty" style="background:transparent;border-style:dashed">Add included items to see your sheet preview.</div>`}
          </div>

          ${settings.footerNote ? `<div class="sheet-footer">${esc(settings.footerNote)}</div>` : ""}
        </div>
      `;
    }

    async function exportPriceSheetImage(){
      const el = document.getElementById("exportSheet");
      if(!el){
        alert("No price sheet found to export.");
        return;
      }

      try{
        const canvas = await html2canvas(el, {
          backgroundColor: null,
          scale: 2,
          useCORS: true
        });

        const link = document.createElement("a");
        link.download = "isotrack-price-sheet.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch(err){
        alert("Image export failed.");
      }
    }
