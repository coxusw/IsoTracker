<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IsoTrack</title>
  <style>
    :root{
      --bg:#0d1117;
      --bg2:#111827;
      --panel:#161b22;
      --panel2:#1f2937;
      --card:#18212c;
      --border:rgba(255,255,255,.08);
      --text:#f3f4f6;
      --muted:#b8c0cc;
      --gold:#d4a84f;
      --gold-2:#f0c46b;
      --green:#28c76f;
      --yellow:#f4b942;
      --red:#ea5455;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(212,168,79,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(53,94,59,.12), transparent 22%),
        linear-gradient(180deg, #0b0f14 0%, #101722 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:18px 14px 90px;
    }

    .hero{
      background:
        linear-gradient(135deg, rgba(212,168,79,.14), rgba(212,168,79,.03)),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border:1px solid var(--border);
      border-radius:24px;
      padding:22px 18px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .brand-left h1{
      margin:0;
      font-size:clamp(28px, 4vw, 42px);
      line-height:1;
      letter-spacing:.4px;
    }

    .brand-left p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .brand-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(212,168,79,.28);
      background:rgba(212,168,79,.08);
      color:var(--gold-2);
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin:16px 0 18px;
    }

    .tab{
      appearance:none;
      border:none;
      cursor:pointer;
      padding:14px 10px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      font-weight:700;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      transition:.18s ease;
    }

    .tab:hover{transform:translateY(-1px)}
    .tab.active{
      background:linear-gradient(180deg, rgba(212,168,79,.22), rgba(212,168,79,.10));
      border-color:rgba(212,168,79,.45);
      color:#fff5dd;
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      margin:0 0 14px;
      font-size:22px;
    }

    .subtext{
      margin:-4px 0 16px;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:11px 14px;
      font-weight:700;
      color:white;
      background:linear-gradient(180deg, #2b3441, #1c2530);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      transition:.18s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:linear-gradient(180deg, #e0b860, #b88932);
      color:#1a1205;
      border:1px solid rgba(255,215,140,.45);
    }

    .btn-danger{
      background:linear-gradient(180deg, #b34343, #7d2727);
    }

    .btn-ghost{
      background:rgba(255,255,255,.04);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:14px;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent);
      border:1px solid var(--border);
      border-radius:20px;
      padding:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card.clickable{cursor:pointer}
    .card.clickable:hover{transform:translateY(-2px); transition:.18s ease}

    .status-green{border-left:6px solid var(--green)}
    .status-yellow{border-left:6px solid var(--yellow)}
    .status-red{border-left:6px solid var(--red)}

    .card-header{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .card-title{
      margin:0;
      font-size:18px;
      line-height:1.15;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
      white-space:nowrap;
    }

    .badge.green{background:rgba(40,199,111,.12); color:#92efbb; border-color:rgba(40,199,111,.25)}
    .badge.yellow{background:rgba(244,185,66,.12); color:#ffd77c; border-color:rgba(244,185,66,.25)}
    .badge.red{background:rgba(234,84,85,.12); color:#ffadad; border-color:rgba(234,84,85,.25)}

    .meta{
      display:grid;
      gap:7px;
      color:var(--muted);
      font-size:14px;
      margin-top:10px;
    }

    .meta strong{
      color:var(--text);
      font-weight:700;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
    }

    .thumb{
      width:100%;
      max-height:180px;
      object-fit:cover;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      margin:10px 0 4px;
      display:block;
      background:#0f141b;
    }

    label{
      display:block;
      margin:10px 0 6px;
      font-size:14px;
      color:#e5e7eb;
      font-weight:700;
    }

    input, textarea, select{
      width:100%;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#0f1722;
      color:var(--text);
      outline:none;
      font-size:15px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input::placeholder, textarea::placeholder{
      color:#8d99a8;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
      gap:12px;
    }

    .empty{
      text-align:center;
      padding:32px 18px;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.12);
      border-radius:20px;
      background:rgba(255,255,255,.02);
    }

    .type-row{
      display:grid;
      grid-template-columns:1.1fr .8fr .8fr;
      gap:10px;
      align-items:end;
      margin-bottom:12px;
    }

    .preview-sheet{
      margin-top:18px;
      background:linear-gradient(180deg, #111722, #182331);
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .preview-head{
      padding:22px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(135deg, rgba(212,168,79,.22), rgba(212,168,79,.06)),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .preview-head h2{
      margin:0;
      font-size:28px;
    }

    .preview-head p{
      margin:6px 0 0;
      color:#d8dee8;
    }

    .preview-logo{
      max-width:120px;
      max-height:120px;
      object-fit:contain;
      border-radius:12px;
      display:block;
      margin-bottom:12px;
      background:rgba(255,255,255,.04);
      padding:8px;
    }

    .preview-body{
      padding:16px;
    }

    .price-item{
      display:flex;
      justify-content:space-between;
      gap:18px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .price-item:last-child{border-bottom:none}

    .muted{color:var(--muted)}
    .hidden{display:none}

    .top-note{
      margin:0 0 12px;
      color:#fff1ce;
      font-size:13px;
      background:rgba(212,168,79,.12);
      border:1px solid rgba(212,168,79,.22);
      border-radius:14px;
      padding:10px 12px;
    }

    @media (max-width:700px){
      .tabs{grid-template-columns:repeat(2,1fr)}
      .type-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">
        <div class="brand-left">
          <h1>IsoTrack</h1>
          <p>Premium colony tracking for isopod keepers.</p>
        </div>
        <div class="brand-pill">Colony Care • Population • Price Sheets</div>
      </div>
    </section>

    <div class="tabs">
      <button class="tab active" data-tab="colonies">Colonies</button>
      <button class="tab" data-tab="husbandry">Husbandry</button>
      <button class="tab" data-tab="population">Population</button>
      <button class="tab" data-tab="price">Price Sheet</button>
    </div>

    <section class="panel">
      <div id="app"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "isotrackData_v2";
    const SETTINGS_KEY = "isotrackSettings_v2";
    const PRICE_KEY = "isotrackPrices_v2";

    let colonies = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"businessName":"Crested Critters","logoUri":"","theme":"botanical"}');
    let priceData = JSON.parse(localStorage.getItem(PRICE_KEY) || "{}");
    let activeTab = "colonies";

    function saveColonies(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(colonies)); }
    function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
    function savePrices(){ localStorage.setItem(PRICE_KEY, JSON.stringify(priceData)); }

    function formatDate(d){
      if(!d) return "";
      const dt = new Date(d);
      const m = String(dt.getMonth()+1).padStart(2,"0");
      const day = String(dt.getDate()).padStart(2,"0");
      const y = dt.getFullYear();
      return `${m}/${day}/${y}`;
    }

    function todayString(){
      return formatDate(new Date());
    }

    function parseDateString(str){
      if(!str) return null;
      const parts = str.split("/");
      if(parts.length !== 3) return null;
      const [m,d,y] = parts.map(Number);
      return new Date(y, m-1, d);
    }

    function daysSince(dateStr){
      if(!dateStr) return 999999;
      const dt = parseDateString(dateStr);
      if(!dt) return 999999;
      const now = new Date();
      const diff = now.setHours(0,0,0,0) - dt.setHours(0,0,0,0);
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getStatus(days){
      if(days <= 3) return "green";
      if(days <= 10) return "yellow";
      return "red";
    }

    function statusLabel(days){
      if(days <= 3) return "Checked recently";
      if(days <= 10) return "Needs attention soon";
      return "Needs checked";
    }

    function updateLastHusbandry(colony){
      const dates = [
        colony.lastMisting,
        colony.lastBotanicalsCheck,
        colony.lastSubstrateCheck,
        colony.lastSupplementalFeeding
      ].filter(Boolean);

      if(!dates.length){
        colony.lastHusbandry = "";
        return;
      }

      let newest = dates[0];
      dates.forEach(d => {
        if(parseDateString(d) > parseDateString(newest)) newest = d;
      });
      colony.lastHusbandry = newest;
    }

    function uniqueTypes(){
      return [...new Set(colonies.map(c => c.typeName.trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    }

    function setTab(tab){
      activeTab = tab;
      document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      if(tab === "colonies") renderColonies();
      if(tab === "husbandry") renderHusbandry();
      if(tab === "population") renderPopulation();
      if(tab === "price") renderPriceSheet();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    function app(html){
      document.getElementById("app").innerHTML = html;
    }

    function escapeHtml(text){
      return (text || "").replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
      }[m]));
    }

    function renderColonies(){
      let html = `
        <h2 class="section-title">Colonies</h2>
        <p class="subtext">Track every colony, update care quickly, and keep your collection organized.</p>
        <div class="toolbar">
          <button class="btn btn-primary" onclick="showAddForm()">+ Add Colony</button>
          <button class="btn btn-ghost" onclick="loadDemoData()">Load Demo Data</button>
          <button class="btn btn-ghost" onclick="clearAllData()">Clear All</button>
        </div>
      `;

      if(!colonies.length){
        html += `<div class="empty">No colonies yet. Add your first colony to start tracking.</div>`;
        return app(html);
      }

      html += `<div class="grid">`;
      colonies
        .slice()
        .sort((a,b)=>a.colonyName.localeCompare(b.colonyName))
        .forEach((colony, index) => {
          const days = daysSince(colony.lastHusbandry);
          const status = getStatus(days);
          html += `
            <div class="card clickable status-${status}" onclick="openColony(${index})">
              <div class="card-header">
                <div>
                  <h3 class="card-title">${escapeHtml(colony.colonyName)}</h3>
                  <div class="muted">${escapeHtml(colony.typeName)}</div>
                </div>
                <span class="badge ${status}">${colony.lastHusbandry ? colony.lastHusbandry : "Never checked"}</span>
              </div>
              ${colony.typeImageUri ? `<img class="thumb" src="${colony.typeImageUri}" alt="">` : ""}
              <div class="meta">
                <div><strong>Population:</strong> ${Number(colony.population) || 0}</div>
                <div><strong>Date added:</strong> ${colony.dateAdded || "-"}</div>
                <div><strong>Last husbandry:</strong> ${colony.lastHusbandry || "Never"}</div>
              </div>
            </div>
          `;
        });
      html += `</div>`;

      app(html);
    }

    function showAddForm(){
      app(`
        <h2 class="section-title">Add Colony</h2>
        <p class="subtext">Create a new colony record. Colony names must be unique.</p>
        <div class="form-grid">
          <div>
            <label>Colony Name</label>
            <input id="colonyName" placeholder="Example: Red Panda Bin 1">
          </div>
          <div>
            <label>Type Name</label>
            <input id="typeName" placeholder="Example: Red Panda">
          </div>
          <div>
            <label>Date Added</label>
            <input id="dateAdded" placeholder="mm/dd/yyyy" value="${todayString()}">
          </div>
          <div>
            <label>Population</label>
            <input id="population" type="number" min="0" step="1" placeholder="0">
          </div>
        </div>

        <div class="form-grid">
          <div>
            <label>Last Misting</label>
            <input id="lastMisting" placeholder="mm/dd/yyyy">
          </div>
          <div>
            <label>Last Botanicals Check</label>
            <input id="lastBotanicalsCheck" placeholder="mm/dd/yyyy">
          </div>
          <div>
            <label>Last Substrate Check</label>
            <input id="lastSubstrateCheck" placeholder="mm/dd/yyyy">
          </div>
          <div>
            <label>Last Supplemental Feeding</label>
            <input id="lastSupplementalFeeding" placeholder="mm/dd/yyyy">
          </div>
        </div>

        <label>Type Picture</label>
        <input id="typeImage" type="file" accept="image/*">

        <label>Custom Note</label>
        <textarea id="customNote" placeholder="Any notes for this colony..."></textarea>

        <div class="actions">
          <button class="btn btn-primary" onclick="saveNewColony()">Save Colony</button>
          <button class="btn" onclick="renderColonies()">Cancel</button>
        </div>
      `);
    }

    function saveNewColony(){
      const colonyName = document.getElementById("colonyName").value.trim();
      const typeName = document.getElementById("typeName").value.trim();

      if(!colonyName){
        alert("Colony name is required.");
        return;
      }

      if(!typeName){
        alert("Type name is required.");
        return;
      }

      if(colonies.some(c => c.colonyName.toLowerCase() === colonyName.toLowerCase())){
        alert("Colony name already in use. Please choose a different colony name.");
        return;
      }

      const file = document.getElementById("typeImage").files[0];

      const colony = {
        colonyName,
        typeName,
        typeImageUri: "",
        dateAdded: document.getElementById("dateAdded").value.trim() || todayString(),
        population: Math.max(0, parseInt(document.getElementById("population").value || "0", 10)),
        lastMisting: document.getElementById("lastMisting").value.trim(),
        lastBotanicalsCheck: document.getElementById("lastBotanicalsCheck").value.trim(),
        lastSubstrateCheck: document.getElementById("lastSubstrateCheck").value.trim(),
        lastSupplementalFeeding: document.getElementById("lastSupplementalFeeding").value.trim(),
        lastHusbandry: "",
        customNote: document.getElementById("customNote").value.trim()
      };

      updateLastHusbandry(colony);

      if(file){
        const reader = new FileReader();
        reader.onload = function(e){
          colony.typeImageUri = e.target.result;
          colonies.push(colony);
          saveColonies();
          renderColonies();
        };
        reader.readAsDataURL(file);
      } else {
        colonies.push(colony);
        saveColonies();
        renderColonies();
      }
    }

    function openColony(index){
      const c = colonies[index];
      app(`
        <h2 class="section-title">${escapeHtml(c.colonyName)}</h2>
        <p class="subtext">${escapeHtml(c.typeName)}</p>

        ${c.typeImageUri ? `<img class="thumb" src="${c.typeImageUri}" alt="">` : ""}

        <div class="meta" style="margin-bottom:14px">
          <div><strong>Date added:</strong> ${c.dateAdded || "-"}</div>
          <div><strong>Last husbandry:</strong> ${c.lastHusbandry || "Never"}</div>
        </div>

        <div class="actions" style="margin-bottom:16px">
          <button class="btn btn-primary" onclick="quickAction(${index}, 'misting')">Mark Misted Now</button>
          <button class="btn btn-primary" onclick="quickAction(${index}, 'feeding')">Mark Fed Now</button>
          <button class="btn btn-primary" onclick="quickAction(${index}, 'botanicals')">Mark Botanicals Checked Now</button>
          <button class="btn btn-primary" onclick="quickAction(${index}, 'substrate')">Mark Substrate Checked Now</button>
        </div>

        <div class="form-grid">
          <div>
            <label>Population</label>
            <input id="editPopulation" type="number" min="0" step="1" value="${Number(c.population) || 0}">
          </div>
          <div>
            <label>Last Misting</label>
            <input id="editMisting" value="${c.lastMisting || ""}" placeholder="mm/dd/yyyy">
          </div>
          <div>
            <label>Last Botanicals Check</label>
            <input id="editBotanicals" value="${c.lastBotanicalsCheck || ""}" placeholder="mm/dd/yyyy">
          </div>
          <div>
            <label>Last Substrate Check</label>
            <input id="editSubstrate" value="${c.lastSubstrateCheck || ""}" placeholder="mm/dd/yyyy">
          </div>
          <div>
            <label>Last Supplemental Feeding</label>
            <input id="editFeeding" value="${c.lastSupplementalFeeding || ""}" placeholder="mm/dd/yyyy">
          </div>
        </div>

        <label>Custom Note</label>
        <textarea id="editNote" placeholder="Any notes for this colony...">${escapeHtml(c.customNote || "")}</textarea>

        <div class="actions">
          <button class="btn btn-primary" onclick="saveColonyEdits(${index})">Save Changes</button>
          <button class="btn" onclick="renderColonies()">Back</button>
          <button class="btn btn-danger" onclick="deleteColony(${index})">Delete Colony</button>
        </div>
      `);
    }

    function saveColonyEdits(index){
      const c = colonies[index];
      c.population = Math.max(0, parseInt(document.getElementById("editPopulation").value || "0", 10));
      c.lastMisting = document.getElementById("editMisting").value.trim();
      c.lastBotanicalsCheck = document.getElementById("editBotanicals").value.trim();
      c.lastSubstrateCheck = document.getElementById("editSubstrate").value.trim();
      c.lastSupplementalFeeding = document.getElementById("editFeeding").value.trim();
      c.customNote = document.getElementById("editNote").value.trim();
      updateLastHusbandry(c);
      saveColonies();
      openColony(index);
      alert("Colony updated.");
    }

    function quickAction(index, type){
      const today = todayString();
      const c = colonies[index];

      if(type === "misting") c.lastMisting = today;
      if(type === "feeding") c.lastSupplementalFeeding = today;
      if(type === "botanicals") c.lastBotanicalsCheck = today;
      if(type === "substrate") c.lastSubstrateCheck = today;

      c.lastHusbandry = today;
      saveColonies();
      openColony(index);
      alert("Colony updated.");
    }

    function deleteColony(index){
      if(confirm("Are you sure you want to delete this colony?")){
        colonies.splice(index, 1);
        saveColonies();
        renderColonies();
      }
    }

    function renderHusbandry(){
      let sorted = colonies.slice().sort((a,b) => daysSince(b.lastHusbandry) - daysSince(a.lastHusbandry));

      let html = `
        <h2 class="section-title">Husbandry</h2>
        <p class="subtext">Oldest checked colonies appear at the top so you can see what needs attention first.</p>
      `;

      if(!sorted.length){
        html += `<div class="empty">No colonies yet. Add a colony first to use the husbandry list.</div>`;
        return app(html);
      }

      html += `<div class="grid">`;
      sorted.forEach(colony => {
        const originalIndex = colonies.findIndex(c => c.colonyName === colony.colonyName);
        const days = daysSince(colony.lastHusbandry);
        const status = getStatus(days);

        html += `
          <div class="card clickable status-${status}" onclick="openColony(${originalIndex})">
            <div class="card-header">
              <div>
                <h3 class="card-title">${escapeHtml(colony.colonyName)}</h3>
                <div class="muted">${escapeHtml(colony.typeName)}</div>
              </div>
              <span class="badge ${status}">${statusLabel(days)}</span>
            </div>
            <div class="meta">
              <div><strong>Population:</strong> ${Number(colony.population) || 0}</div>
              <div><strong>Last husbandry:</strong> ${colony.lastHusbandry || "Never"}</div>
              <div><strong>Days since checked:</strong> ${colony.lastHusbandry ? days : "N/A"}</div>
            </div>
          </div>
        `;
      });
      html += `</div>`;

      app(html);
    }

    function renderPopulation(){
      let totals = {};

      colonies.forEach(c => {
        const type = c.typeName.trim();
        if(!type) return;
        if(!totals[type]) totals[type] = 0;
        totals[type] += Number(c.population) || 0;
      });

      const types = Object.keys(totals).sort((a,b)=>a.localeCompare(b));

      let html = `
        <h2 class="section-title">Population</h2>
        <p class="subtext">View total population by type. Tap a type to see which colonies make up the total.</p>
      `;

      if(!types.length){
        html += `<div class="empty">No colony types found yet.</div>`;
        return app(html);
      }

      html += `<div class="grid">`;
      types.forEach(type => {
        html += `
          <div class="card clickable" onclick="openPopulationBreakdown('${type.replace(/'/g,"\\'")}')">
            <div class="card-header">
              <div>
                <h3 class="card-title">${escapeHtml(type)}</h3>
                <div class="muted">Combined population</div>
              </div>
              <span class="badge">${totals[type]}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;

      app(html);
    }

    function openPopulationBreakdown(type){
      const matches = colonies
        .filter(c => c.typeName === type)
        .sort((a,b)=> (Number(b.population)||0) - (Number(a.population)||0));

      const total = matches.reduce((sum,c)=>sum + (Number(c.population) || 0), 0);

      let html = `
        <h2 class="section-title">${escapeHtml(type)} — Total ${total}</h2>
        <p class="subtext">Population breakdown by colony.</p>
        <div class="actions" style="margin-bottom:16px">
          <button class="btn" onclick="renderPopulation()">Back</button>
        </div>
        <div class="grid">
      `;

      matches.forEach(c => {
        html += `
          <div class="card">
            <div class="card-header">
              <div>
                <h3 class="card-title">${escapeHtml(c.colonyName)}</h3>
                <div class="muted">${escapeHtml(c.typeName)}</div>
              </div>
              <span class="badge">${Number(c.population)||0}</span>
            </div>
            <div class="meta">
              <div><strong>Last husbandry:</strong> ${c.lastHusbandry || "Never"}</div>
            </div>
          </div>
        `;
      });

      html += `</div>`;
      app(html);
    }

    function renderPriceSheet(){
      const types = uniqueTypes();

      let html = `
        <h2 class="section-title">Price Sheet</h2>
        <p class="subtext">Create a branded price sheet from the colony types already in your collection.</p>
        <p class="top-note">For this web version, the preview is live and can be printed or screenshotted. If you want, I can add a one-click downloadable image export next.</p>

        <div class="form-grid">
          <div>
            <label>Business Name</label>
            <input id="businessName" value="${escapeHtml(settings.businessName || "")}" placeholder="Business Name">
          </div>
          <div>
            <label>Theme</label>
            <select id="themeSelect">
              <option value="botanical" ${settings.theme === "botanical" ? "selected" : ""}>Botanical</option>
              <option value="dark" ${settings.theme === "dark" ? "selected" : ""}>Dark Premium</option>
              <option value="light" ${settings.theme === "light" ? "selected" : ""}>Clean Light</option>
            </select>
          </div>
        </div>

        <label>Upload Logo</label>
        <input id="logoUpload" type="file" accept="image/*">

        <div style="margin-top:16px">
      `;

      if(!types.length){
        html += `<div class="empty">No colony types found yet. Add colonies first and the price sheet will auto-populate.</div>`;
      } else {
        types.forEach(type => {
          const existing = priceData[type] || { price:"", countLabel:"" };
          html += `
            <div class="type-row">
              <div>
                <label>${escapeHtml(type)}</label>
                <input value="${escapeHtml(type)}" disabled>
              </div>
              <div>
                <label>Price</label>
                <input id="price_${slug(type)}" placeholder="$25" value="${escapeHtml(existing.price || "")}">
              </div>
              <div>
                <label>Count</label>
                <input id="count_${slug(type)}" placeholder="10ct" value="${escapeHtml(existing.countLabel || "")}">
              </div>
            </div>
          `;
        });
      }

      html += `
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="savePriceSheetSettings()">Save Price Sheet</button>
          <button class="btn" onclick="printPriceSheet()">Print / Save PDF</button>
        </div>

        <div id="pricePreviewWrap"></div>
      `;

      app(html);
      renderPricePreview();
    }

    function slug(str){
      return str.toLowerCase().replace(/[^a-z0-9]+/g, "_");
    }

    function savePriceSheetSettings(){
      settings.businessName = document.getElementById("businessName").value.trim() || "IsoTrack";
      settings.theme = document.getElementById("themeSelect").value;

      uniqueTypes().forEach(type => {
        priceData[type] = {
          price: document.getElementById(`price_${slug(type)}`)?.value.trim() || "",
          countLabel: document.getElementById(`count_${slug(type)}`)?.value.trim() || ""
        };
      });

      const file = document.getElementById("logoUpload").files[0];

      function finishSave(){
        saveSettings();
        savePrices();
        renderPriceSheet();
        alert("Price sheet settings saved.");
      }

      if(file){
        const reader = new FileReader();
        reader.onload = function(e){
          settings.logoUri = e.target.result;
          finishSave();
        };
        reader.readAsDataURL(file);
      } else {
        finishSave();
      }
    }

    function renderPricePreview(){
      const wrap = document.getElementById("pricePreviewWrap");
      if(!wrap) return;

      const themeStyles = {
        botanical: {
          headBg: "linear-gradient(135deg, rgba(212,168,79,.22), rgba(66,102,68,.12))",
          bodyBg: "linear-gradient(180deg, #101722, #1b2635)"
        },
        dark: {
          headBg: "linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,.03))",
          bodyBg: "linear-gradient(180deg, #0f141b, #171d26)"
        },
        light: {
          headBg: "linear-gradient(135deg, rgba(212,168,79,.22), rgba(255,255,255,.85))",
          bodyBg: "linear-gradient(180deg, #f7f5ef, #ece8dd)"
        }
      };

      const types = uniqueTypes();
      const theme = themeStyles[settings.theme] || themeStyles.botanical;
      const lightMode = settings.theme === "light";

      let items = types.map(type => {
        const row = priceData[type] || {};
        return `
          <div class="price-item" style="${lightMode ? "color:#1f2937;border-bottom:1px solid rgba(0,0,0,.08)" : ""}">
            <div>
              <div style="font-weight:700">${escapeHtml(type)}</div>
              <div class="muted" style="${lightMode ? "color:#5b6470" : ""}">${escapeHtml(row.countLabel || "")}</div>
            </div>
            <div style="font-weight:800">${escapeHtml(row.price || "")}</div>
          </div>
        `;
      }).join("");

      wrap.innerHTML = `
        <div class="preview-sheet" id="printablePriceSheet" style="${lightMode ? "background:#f8f5ee;color:#1f2937" : ""}">
          <div class="preview-head" style="background:${theme.headBg};${lightMode ? "border-bottom:1px solid rgba(0,0,0,.08)" : ""}">
            ${settings.logoUri ? `<img class="preview-logo" src="${settings.logoUri}" alt="">` : ""}
            <h2 style="${lightMode ? "color:#1c2430" : ""}">${escapeHtml(settings.businessName || "IsoTrack")}</h2>
            <p style="${lightMode ? "color:#4b5563" : ""}">Price Sheet</p>
          </div>
          <div class="preview-body" style="background:${theme.bodyBg}">
            ${items || `<div class="muted">No types added yet.</div>`}
          </div>
        </div>
      `;
    }

    function printPriceSheet(){
      const sheet = document.getElementById("printablePriceSheet");
      if(!sheet){
        alert("No price sheet preview found.");
        return;
      }

      const w = window.open("", "_blank");
      w.document.write(`
        <html>
          <head>
            <title>Price Sheet</title>
            <style>
              body{font-family:Arial,sans-serif;padding:20px;background:#fff}
            </style>
          </head>
          <body>${sheet.outerHTML}</body>
        </html>
      `);
      w.document.close();
      w.focus();
      w.print();
    }

    function clearAllData(){
      if(confirm("Clear all colony data, settings, and price sheet info?")){
        colonies = [];
        settings = { businessName:"Crested Critters", logoUri:"", theme:"botanical" };
